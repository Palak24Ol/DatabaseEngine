<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Engine v1.0</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111318;
    --surface2: #181c22;
    --surface3: #1e2330;
    --border: #252a35;
    --border2: #2e3545;
    --accent: #00d4aa;
    --accent2: #0099ff;
    --accent3: #ff6b35;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #4a5568;
    --success: #00d4aa;
    --error: #ff4d6d;
    --warn: #ffa726;
    --keyword: #569cd6;
    --string: #ce9178;
    --number: #b5cea8;
    --fn: #dcdcaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.05em;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .logo-text { color: var(--text); }
  .logo-version {
    font-size: 10px;
    color: var(--accent);
    background: rgba(0,212,170,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
  }

  .topbar-sep {
    width: 1px;
    height: 24px;
    background: var(--border);
    margin: 0 4px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .status-text {
    font-size: 11px;
    color: var(--text2);
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab-btn {
    padding: 4px 12px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab-btn:hover, .tab-btn.active {
    background: var(--surface3);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 12px 14px 8px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .tables-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .table-item {
    padding: 7px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
    color: var(--text2);
  }

  .table-item:hover {
    background: var(--surface2);
    color: var(--text);
  }

  .table-item.active {
    background: rgba(0,212,170,0.08);
    color: var(--accent);
    border-left: 2px solid var(--accent);
  }

  .table-icon {
    font-size: 11px;
    opacity: 0.7;
  }

  .table-cols {
    display: none;
    padding: 0 0 4px 32px;
  }

  .table-item.active + .table-cols {
    display: block;
  }

  .col-item {
    padding: 3px 6px;
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .col-type {
    color: var(--accent2);
    font-size: 10px;
  }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── QUERY PANEL ── */
  .query-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .query-toolbar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .query-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  .run-btn {
    margin-left: auto;
    padding: 5px 16px;
    background: linear-gradient(135deg, var(--accent), #00b894);
    border: none;
    border-radius: 5px;
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .run-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(0,212,170,0.35);
  }

  .run-btn:active { transform: translateY(0); }

  .clear-btn {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    border-color: var(--error);
    color: var(--error);
  }

  .editor-wrap {
    position: relative;
    min-height: 90px;
  }

  #query-input {
    width: 100%;
    min-height: 90px;
    max-height: 180px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 12px 16px;
    resize: vertical;
    caret-color: var(--accent);
  }

  #query-input::placeholder { color: var(--text3); }

  /* ── QUICK QUERIES ── */
  .quick-queries {
    display: flex;
    gap: 6px;
    padding: 6px 12px 8px;
    flex-wrap: wrap;
  }

  .quick-btn {
    padding: 3px 10px;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .quick-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  /* ── RESULTS PANEL ── */
  .results-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .results-toolbar {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    flex-shrink: 0;
    background: var(--surface);
  }

  .results-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
  }

  .row-count {
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,212,170,0.1);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .exec-time {
    font-size: 11px;
    color: var(--text3);
    margin-left: auto;
  }

  .results-body {
    flex: 1;
    overflow: auto;
  }

  /* ── TABLE ── */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .results-table th {
    background: var(--surface2);
    color: var(--text2);
    font-weight: 600;
    padding: 8px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    white-space: nowrap;
    font-size: 11px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .results-table th:last-child { border-right: none; }

  .results-table td {
    padding: 7px 16px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    white-space: nowrap;
    color: var(--text);
  }

  .results-table td:last-child { border-right: none; }

  .results-table tr:hover td {
    background: rgba(255,255,255,0.02);
  }

  .results-table tr:nth-child(even) td {
    background: rgba(255,255,255,0.01);
  }

  .cell-int { color: var(--number); }
  .cell-null { color: var(--text3); font-style: italic; }

  /* ── EMPTY / MESSAGE STATES ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text3);
  }

  .empty-icon { font-size: 36px; opacity: 0.3; }
  .empty-text { font-size: 12px; }

  .message-box {
    margin: 16px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .message-box.success {
    background: rgba(0,212,170,0.08);
    border: 1px solid rgba(0,212,170,0.2);
    color: var(--success);
  }

  .message-box.error {
    background: rgba(255,77,109,0.08);
    border: 1px solid rgba(255,77,109,0.2);
    color: var(--error);
  }

  /* ── WAL PANEL ── */
  .wal-panel {
    flex: 1;
    overflow: auto;
    display: none;
    flex-direction: column;
  }

  .wal-panel.active { display: flex; }
  .results-panel.wal-visible { display: none; }

  .wal-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .refresh-btn {
    margin-left: auto;
    padding: 3px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: none;
    letter-spacing: 0;
  }

  .refresh-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .wal-entries {
    padding: 8px 0;
    flex: 1;
    overflow-y: auto;
  }

  .wal-entry {
    display: flex;
    align-items: center;
    padding: 5px 16px;
    gap: 16px;
    font-size: 11px;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    transition: background 0.1s;
  }

  .wal-entry:hover { background: rgba(255,255,255,0.02); }

  .wal-lsn {
    color: var(--text3);
    min-width: 70px;
    font-size: 10px;
  }

  .wal-txid {
    color: var(--accent2);
    min-width: 60px;
    font-size: 10px;
  }

  .wal-type {
    min-width: 70px;
    font-weight: 600;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    text-align: center;
  }

  .wal-type.BEGIN { background: rgba(86,156,214,0.15); color: #569cd6; }
  .wal-type.COMMIT { background: rgba(0,212,170,0.12); color: var(--accent); }
  .wal-type.ABORT { background: rgba(255,77,109,0.12); color: var(--error); }
  .wal-type.INSERT { background: rgba(181,206,168,0.12); color: var(--number); }
  .wal-type.DELETE { background: rgba(255,107,53,0.12); color: var(--accent3); }

  .wal-table {
    color: var(--text2);
    font-size: 10px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* ── LOADING ── */
  .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(0,212,170,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .spinner.visible { display: block; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── FADE IN ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeIn 0.2s ease; }

  /* row number column */
  .row-num {
    color: var(--text3);
    font-size: 10px;
    text-align: right;
    padding-right: 12px !important;
    user-select: none;
    min-width: 40px;
  }

  .conn-badge {
    font-size: 10px;
    color: var(--text3);
    background: var(--surface3);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🗄</div>
    <span class="logo-text">DB ENGINE</span>
    <span class="logo-version">v1.0</span>
  </div>
  <div class="topbar-sep"></div>
  <div class="status-dot" id="status-dot"></div>
  <span class="status-text" id="status-text">Connecting...</span>
  <div class="topbar-sep"></div>
  <span class="conn-badge">localhost:8080</span>
  <div class="topbar-right">
    <button class="tab-btn active" onclick="showTab('query')">Query</button>
    <button class="tab-btn" onclick="showTab('wal')">WAL Log</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">Tables</div>
    <div class="tables-list" id="tables-list">
      <div class="table-item" onclick="selectTable('users')">
        <span class="table-icon">⊞</span> users
      </div>
      <div class="table-cols" id="cols-users"></div>
      <div class="table-item" onclick="selectTable('products')">
        <span class="table-icon">⊞</span> products
      </div>
      <div class="table-cols" id="cols-products"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- QUERY PANEL -->
    <div class="query-panel">
      <div class="query-toolbar">
        <span class="query-label">SQL Editor</span>
        <div class="spinner" id="spinner"></div>
        <button class="clear-btn" onclick="clearQuery()">Clear</button>
        <button class="run-btn" onclick="runQuery()">▶ Run</button>
      </div>
      <div class="editor-wrap">
        <textarea id="query-input" spellcheck="false"
          placeholder="SELECT * FROM users WHERE age > 25"
          onkeydown="handleKeydown(event)"></textarea>
      </div>
      <div class="quick-queries">
        <button class="quick-btn" onclick="setQuery('SELECT * FROM users')">SELECT users</button>
        <button class="quick-btn" onclick="setQuery('SELECT * FROM products')">SELECT products</button>
        <button class="quick-btn" onclick="setQuery('SELECT name, age FROM users WHERE age > 25')">WHERE age &gt; 25</button>
        <button class="quick-btn" onclick="setQuery(`INSERT INTO users VALUES (6, 'Frank', 27)`)">INSERT user</button>
        <button class="quick-btn" onclick="setQuery('DELETE FROM users WHERE id = 2')">DELETE id=2</button>
        <button class="quick-btn" onclick="setQuery('CREATE TABLE orders (id INT, item TEXT, qty INT)')">CREATE TABLE</button>
      </div>
    </div>

    <!-- RESULTS PANEL -->
    <div class="results-panel" id="results-panel">
      <div class="results-toolbar">
        <span class="results-label">Results</span>
        <span class="row-count" id="row-count" style="display:none"></span>
        <span class="exec-time" id="exec-time"></span>
      </div>
      <div class="results-body" id="results-body">
        <div class="empty-state">
          <div class="empty-icon">⌨</div>
          <div class="empty-text">Run a query to see results</div>
        </div>
      </div>
    </div>

    <!-- WAL PANEL -->
    <div class="wal-panel" id="wal-panel">
      <div class="wal-header">
        Write-Ahead Log
        <button class="refresh-btn" onclick="loadWAL()">↻ Refresh</button>
      </div>
      <div class="wal-entries" id="wal-entries">
        <div class="empty-state">
          <div class="empty-text">Loading WAL...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'http://localhost:8080';

// ── Connection check ──────────────────────────────────────────
async function checkConnection() {
  try {
    const res = await fetch(`${API}/api/wal`);
    if (res.ok) {
      document.getElementById('status-dot').style.background = 'var(--success)';
      document.getElementById('status-dot').style.boxShadow = '0 0 6px var(--success)';
      document.getElementById('status-text').textContent = 'Connected';
    }
  } catch {
    document.getElementById('status-dot').style.background = 'var(--error)';
    document.getElementById('status-dot').style.boxShadow = '0 0 6px var(--error)';
    document.getElementById('status-text').textContent = 'Not connected — is Go server running?';
  }
}

checkConnection();

// ── Run Query ─────────────────────────────────────────────────
async function runQuery() {
  const sql = document.getElementById('query-input').value.trim();
  if (!sql) return;

  const spinner = document.getElementById('spinner');
  spinner.classList.add('visible');

  const t0 = performance.now();

  try {
    const res = await fetch(`${API}/api/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sql })
    });

    const data = await res.json();
    const elapsed = (performance.now() - t0).toFixed(1);

    document.getElementById('exec-time').textContent = `${elapsed}ms`;
    renderResult(data);
  } catch (err) {
    renderError('Cannot connect to DB server. Make sure Go server is running on :8080');
  } finally {
    spinner.classList.remove('visible');
  }
}

function renderResult(data) {
  const body = document.getElementById('results-body');
  const rowCount = document.getElementById('row-count');

  body.innerHTML = '';

  if (data.error) {
    renderError(data.error);
    rowCount.style.display = 'none';
    return;
  }

  // message (INSERT / DELETE / CREATE)
  if (data.message) {
    const box = document.createElement('div');
    box.className = 'message-box success fade-in';
    box.innerHTML = `<span>✓</span> ${data.message}`;
    body.appendChild(box);
    rowCount.style.display = 'none';
  }

  // table rows
  if (data.rows && data.rows.length > 0 && data.columns) {
    rowCount.textContent = `${data.rows.length} row${data.rows.length !== 1 ? 's' : ''}`;
    rowCount.style.display = 'inline';

    const table = document.createElement('table');
    table.className = 'results-table fade-in';

    // header
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    // row number header
    const thNum = document.createElement('th');
    thNum.className = 'row-num';
    thNum.textContent = '#';
    headerRow.appendChild(thNum);

    data.columns.forEach(col => {
      const th = document.createElement('th');
      th.textContent = col;
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // body
    const tbody = document.createElement('tbody');
    data.rows.forEach((row, i) => {
      const tr = document.createElement('tr');
      // row number
      const tdNum = document.createElement('td');
      tdNum.className = 'row-num';
      tdNum.textContent = i + 1;
      tr.appendChild(tdNum);

      data.columns.forEach(col => {
        const td = document.createElement('td');
        const val = row[col];
        if (val === null || val === undefined || val === '') {
          td.innerHTML = '<span class="cell-null">NULL</span>';
        } else if (!isNaN(val) && val !== '') {
          td.className = 'cell-int';
          td.textContent = val;
        } else {
          td.textContent = val;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    body.appendChild(table);

  } else if (!data.message) {
    body.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">○</div>
        <div class="empty-text">0 rows returned</div>
      </div>`;
    rowCount.style.display = 'none';
  }
}

function renderError(msg) {
  const body = document.getElementById('results-body');
  body.innerHTML = '';
  const box = document.createElement('div');
  box.className = 'message-box error fade-in';
  box.innerHTML = `<span>✕</span> ${msg}`;
  body.appendChild(box);
}

// ── WAL ───────────────────────────────────────────────────────
async function loadWAL() {
  const container = document.getElementById('wal-entries');
  container.innerHTML = '<div class="empty-state"><div class="empty-text">Loading...</div></div>';

  try {
    const res = await fetch(`${API}/api/wal`);
    const data = await res.json();

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-text">WAL is empty</div></div>';
      return;
    }

    container.innerHTML = '';
    data.forEach(entry => {
      const div = document.createElement('div');
      div.className = 'wal-entry fade-in';
      div.innerHTML = `
        <span class="wal-lsn">LSN ${entry.lsn}</span>
        <span class="wal-txid">Tx #${entry.txid}</span>
        <span class="wal-type ${entry.type}">${entry.type}</span>
        <span class="wal-table">${entry.table || ''}</span>
      `;
      container.appendChild(div);
    });
  } catch {
    container.innerHTML = '<div class="empty-state"><div class="empty-text">Cannot load WAL</div></div>';
  }
}

// ── Table sidebar ─────────────────────────────────────────────
function selectTable(name) {
  document.querySelectorAll('.table-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  setQuery(`SELECT * FROM ${name}`);
  runQuery();
}

// ── Tabs ──────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');

  const resultsPanel = document.getElementById('results-panel');
  const walPanel = document.getElementById('wal-panel');

  if (tab === 'wal') {
    resultsPanel.style.display = 'none';
    walPanel.classList.add('active');
    loadWAL();
  } else {
    resultsPanel.style.display = 'flex';
    walPanel.classList.remove('active');
  }
}

// ── Utils ─────────────────────────────────────────────────────
function setQuery(sql) {
  document.getElementById('query-input').value = sql;
}

function clearQuery() {
  document.getElementById('query-input').value = '';
  document.getElementById('results-body').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⌨</div>
      <div class="empty-text">Run a query to see results</div>
    </div>`;
  document.getElementById('row-count').style.display = 'none';
  document.getElementById('exec-time').textContent = '';
}

function handleKeydown(e) {
  // Ctrl+Enter or Cmd+Enter to run
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    runQuery();
  }
}
</script>
</body>
</html>
